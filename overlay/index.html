<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>saarthi</title>
<style>
  /* ─────────────────────────────────────────────────────────────
     saarthi HUD — "readable glass"
     A compact status card with two cute round eyes. A SOLID dark panel
     holds all text so nothing behind it bleeds through, wrapped by a
     thin translucent rim so it still reads as glass. The current action
     is the hero; a few recent steps trail below. One state-driven accent.
     Renders on a transparent overlay surface (WebKit2GTK).
     ───────────────────────────────────────────────────────────── */

  :root {
    /* solid content panel (legible on any background) + glass rim */
    --panel:     rgba(19, 20, 25, 0.96);
    --panel-2:   #15161A;
    --rim:       rgba(255, 255, 255, 0.14);
    --rim-soft:  rgba(255, 255, 255, 0.07);
    --hairline:  rgba(255, 255, 255, 0.08);

    /* text — raised contrast over the old faint values */
    --ink:       #F2F0EA;                       /* hero / primary       */
    --ink-2:     rgba(242, 240, 234, 0.76);     /* secondary (feed)     */
    --ink-3:     rgba(242, 240, 234, 0.52);     /* tertiary / labels    */
    --ink-4:     rgba(242, 240, 234, 0.34);     /* faint captions       */

    --sclera:    #F2EFE6;
    --pupil:     #15161A;

    /* state accent — overridden per state */
    --accent:      #FFB454;                      /* thinking / amber */
    --accent-soft: rgba(255, 180, 84, 0.18);
    --done:        #57D6A6;
    --error:       #FF6B6B;
    --read:        #7FB2E6;

    --mono: "JetBrains Mono", "Iosevka", "Fira Code", "DejaVu Sans Mono",
            ui-monospace, SFMono-Regular, Menlo, monospace;

    --r: 18px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: transparent;
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: var(--mono);
    -webkit-font-smoothing: antialiased;
    color: var(--ink);
    cursor: default;
    user-select: none;
  }

  body {
    display: flex;
    justify-content: flex-end;
    align-items: flex-start;
    padding: 3px;
  }

  /* ── card ─────────────────────────────────────────────── */
  .hud {
    width: 340px;
    position: relative;
    background: var(--panel);                     /* SOLID-ish panel — no bleed-through */
    border: 1px solid var(--rim);                 /* glass rim */
    border-radius: var(--r);
    -webkit-backdrop-filter: blur(16px) saturate(1.3);
    backdrop-filter: blur(16px) saturate(1.3);
    box-shadow:
      0 1px 0 var(--rim-soft) inset,              /* top hairline highlight */
      0 0 0 0.5px rgba(0,0,0,0.4),
      0 26px 52px -16px rgba(0,0,0,0.78),
      0 6px 16px -6px rgba(0,0,0,0.6);
    overflow: hidden;
    transform-origin: top right;
    animation: hud-in 460ms cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes hud-in {
    from { opacity: 0; transform: translateY(-10px) scale(.96); }
    to   { opacity: 1; transform: none; }
  }

  /* hairline accent that breathes along the top edge */
  .hud::before {
    content: "";
    position: absolute; inset: 0 0 auto 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    background-size: 340px 100%;
    opacity: 0; transition: opacity .5s ease;
  }
  body[data-state="active"] .hud::before,
  body[data-state="working"] .hud::before { opacity: .9; animation: sweep 2.4s linear infinite; }
  body[data-state="waiting"] .hud::before,
  body[data-state="dormant_waiting"] .hud::before { opacity: .35; }
  body[data-state="error"]    { --accent: var(--error); --accent-soft: rgba(255,107,107,0.18); }
  body[data-state="complete"] { --accent: var(--done);  --accent-soft: rgba(87,214,166,0.18); }
  body[data-state="timeout"]  { --accent: var(--ink-4); --accent-soft: rgba(242,240,234,0.10); }
  @keyframes sweep { 0% { background-position: -340px 0; } 100% { background-position: 340px 0; } }

  /* ── header: eyes + wordmark + state ──────────────────── */
  header {
    display: flex; align-items: center; gap: 13px;
    padding: 15px 16px 13px;
    border-bottom: 1px solid var(--hairline);
  }
  .face { position: relative; display: flex; align-items: center; gap: 6px; flex: none; }
  .eye {
    position: relative; width: 21px; height: 26px;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 36%, #ffffff 0%, var(--sclera) 58%, #d9d5c8 100%);
    box-shadow: 0 0 0 1px rgba(0,0,0,0.25) inset;
    overflow: hidden;
    transition: box-shadow .4s ease;
  }
  body[data-state="active"] .eye,
  body[data-state="working"] .eye { animation: eyeglow 1.8s ease-in-out infinite; }
  @keyframes eyeglow {
    0%,100% { box-shadow: 0 0 0 1px rgba(0,0,0,.25) inset, 0 0 7px 0 var(--accent-soft); }
    50%     { box-shadow: 0 0 0 1px rgba(0,0,0,.25) inset, 0 0 13px 2px var(--accent-soft); }
  }
  .lid {
    position: absolute; left: -2px; right: -2px; top: -2px;
    height: 0%;
    background: var(--panel-2);
    border-bottom: 1px solid rgba(0,0,0,0.4);
    border-radius: 0 0 50% 50% / 0 0 15px 15px;
    transition: height .12s ease;
    z-index: 3;
  }
  .lid.bottom { top: auto; bottom: -2px; border-radius: 50% 50% 0 0 / 15px 15px 0 0; border-bottom: none; }
  .pupil {
    position: absolute; left: 50%; top: 50%;
    width: 12px; height: 12px; margin: -6px 0 0 -6px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 32%, #3a3b42 0%, var(--pupil) 55%);
    transform: translate(var(--px, 0px), var(--py, 0px));
    transition: transform .18s cubic-bezier(.5,0,.2,1);
    z-index: 2;
  }
  .pupil::after {
    content: ""; position: absolute; left: 2px; top: 1.5px;
    width: 3.6px; height: 3.6px; border-radius: 50%;
    background: rgba(255,255,255,.9); filter: blur(.3px);
  }

  .brand { display: flex; align-items: baseline; gap: 8px; flex: 1; min-width: 0; }
  .brand .name {
    font-size: 14px; font-weight: 700; letter-spacing: .14em;
    text-transform: lowercase; color: var(--ink);
  }
  .brand .name b { color: var(--accent); font-weight: 700; transition: color .4s ease; }

  /* state chip with spinner + step count */
  .state { display: flex; align-items: center; gap: 7px; flex: none; }
  .spinner {
    width: 13px; height: 13px; border-radius: 50%;
    border: 2px solid var(--accent-soft); border-top-color: var(--accent);
    animation: spin .7s linear infinite; opacity: 0; transition: opacity .3s ease;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ink-4); transition: background .4s ease; }
  .state .label {
    font-size: 10.5px; letter-spacing: .18em; text-transform: uppercase; color: var(--ink-3);
  }
  .state .count { font-size: 10.5px; letter-spacing: .04em; color: var(--ink-4); }
  .state .count:empty { display: none; }
  body[data-state="active"] .spinner, body[data-state="working"] .spinner { opacity: 1; }
  body[data-state="active"] .state .dot, body[data-state="working"] .state .dot { display: none; }
  body:not([data-state="idle"]) .state .label { color: var(--accent); }
  body[data-state="idle"] .spinner, body[data-state="waiting"] .spinner,
  body[data-state="dormant_waiting"] .spinner, body[data-state="complete"] .spinner,
  body[data-state="error"] .spinner, body[data-state="timeout"] .spinner { display: none; }
  body[data-state="idle"] .state .dot, body[data-state="waiting"] .state .dot,
  body[data-state="dormant_waiting"] .state .dot, body[data-state="complete"] .state .dot,
  body[data-state="error"] .state .dot, body[data-state="timeout"] .state .dot {
    background: var(--accent); box-shadow: 0 0 8px var(--accent);
  }

  /* ── current action — the hero ────────────────────────── */
  .now {
    padding: 14px 16px;
    display: flex; align-items: center; gap: 11px;
    min-height: 50px;
  }
  .now .glyph {
    font-size: 16px; line-height: 1; color: var(--accent); flex: none;
    width: 18px; text-align: center;
  }
  body[data-state="active"] .now .glyph, body[data-state="working"] .now .glyph { animation: spin 1.1s linear infinite; }
  .now .text {
    font-size: 15px; font-weight: 500; letter-spacing: .005em; color: var(--ink);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  body:not([data-state="active"]):not([data-state="working"]) .now .text { color: var(--ink-2); }

  /* ── feed — short, legible context ────────────────────── */
  .feed {
    border-top: 1px solid var(--hairline);
    padding: 8px 8px 10px;
    display: flex; flex-direction: column;
  }
  .feed-title {
    font-size: 9px; letter-spacing: .26em; text-transform: uppercase;
    color: var(--ink-4); padding: 4px 8px 7px;
  }
  .row {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 8px; border-radius: 9px;
    animation: row-in .42s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes row-in { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: none; } }
  .row .ico { width: 14px; flex: none; text-align: center; font-size: 12px; line-height: 1; color: var(--ink-3); }
  .row .lbl {
    font-size: 12.5px; color: var(--ink-2);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
  }
  .row .kind { width: 5px; height: 5px; border-radius: 50%; flex: none; background: var(--ink-4); }
  .row[data-kind="act"]  .kind { background: var(--accent); }
  .row[data-kind="read"] .kind { background: var(--read); }
  .row[data-st="running"] { background: var(--accent-soft); }
  .row[data-st="running"] .ico { color: var(--accent); animation: spin 1.1s linear infinite; }
  .row[data-st="running"] .lbl { color: var(--ink); }
  .row[data-st="done"]  .ico { color: var(--done); }
  .row[data-st="error"] { background: rgba(255,107,107,0.12); }
  .row[data-st="error"] .ico { color: var(--error); }
  .row[data-st="error"] .lbl { color: #ffd0d0; }
  .feed:empty { display: none; }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: .001ms !important; animation-iteration-count: 1 !important; }
    .spinner { border-top-color: var(--accent); }
  }
</style>
</head>
<body data-state="idle">
  <div class="hud" role="status" aria-live="polite">
    <header>
      <div class="face" aria-hidden="true">
        <div class="eye"><div class="pupil"></div><div class="lid top"></div><div class="lid bottom"></div></div>
        <div class="eye"><div class="pupil"></div><div class="lid top"></div><div class="lid bottom"></div></div>
      </div>
      <div class="brand">
        <div class="name"><b>saarthi</b></div>
      </div>
      <div class="state">
        <div class="spinner"></div>
        <div class="dot"></div>
        <div class="label" id="stateLabel">idle</div>
        <div class="count" id="stateCount"></div>
      </div>
    </header>

    <div class="now">
      <div class="glyph" id="nowGlyph">✓</div>
      <div class="text" id="nowText">standing by</div>
    </div>

    <div class="feed" id="feed"></div>
  </div>

<script>
(() => {
  "use strict";

  const body    = document.body;
  const pupils  = document.querySelectorAll(".pupil");
  const lidTops = document.querySelectorAll(".lid.top");
  const lidBots = document.querySelectorAll(".lid.bottom");
  const stateEl = document.getElementById("stateLabel");
  const countEl = document.getElementById("stateCount");
  const nowText = document.getElementById("nowText");
  const nowGlyph= document.getElementById("nowGlyph");
  const feed    = document.getElementById("feed");

  const GLYPH = { running: "⟳", done: "✓", error: "✗" };
  const LABEL = {
    active: "thinking", working: "working", waiting: "waiting",
    dormant_waiting: "still here", complete: "done", error: "error",
    timeout: "timeout", idle: "idle",
  };

  let state = "idle";
  let lastRenderedIds = "";
  let taskSeed = 1;

  function seededUnit(n) {
    const x = Math.sin((taskSeed + n) * 12.9898) * 43758.5453;
    return x - Math.floor(x);
  }

  // ── eye behaviour ──────────────────────────────────────
  let saccadeT = 0, blinkT = 0;
  function look(dx, dy) {
    pupils.forEach((p) => { p.style.setProperty("--px", dx + "px"); p.style.setProperty("--py", dy + "px"); });
  }
  function blink(amount) {
    const top = Math.round(amount * 72) + "%";
    const bot = Math.round(amount * 34) + "%";
    lidTops.forEach((l) => (l.style.height = top));
    lidBots.forEach((l) => (l.style.height = bot));
  }

  function tick(ts) {
    if (state === "active" || state === "working") {
      if (ts > saccadeT) {
        const n = Math.floor(ts / 520);
        const a = seededUnit(n) * Math.PI * 2;
        const r = 1 + seededUnit(n + 41) * 3;
        look(Math.cos(a) * r, Math.sin(a) * r);
        saccadeT = ts + 520 + seededUnit(n + 7) * 820;
      }
      if (ts > blinkT) {
        blink(1); setTimeout(() => blink(0), 95);
        blinkT = ts + 1800 + seededUnit(Math.floor(ts / 1700) + 9) * 3200;
      }
    } else if (state === "waiting") {
      const n = Math.floor(ts / 1900);
      look((seededUnit(n) - .5) * 4, 2 + (seededUnit(n + 3) - .5) * 2);
      blink(0.22);
    } else if (state === "error") {
      look(0, -1); blink(0.08);
    } else if (state === "complete") {
      look(0, 1); blink(0.35);
    } else {
      look(0, 4); blink(0.55);
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  // ── render ─────────────────────────────────────────────
  function setState(s) {
    if (s === state) return;
    state = s;
    body.setAttribute("data-state", s);
    stateEl.textContent = LABEL[s] || s;
    if (s === "active" || s === "working") { saccadeT = 0; blinkT = performance.now() + 1200; }
  }

  function render(snap) {
    if (!snap) return;
    const task = snap.schema === 2 ? snap.task : null;
    if (task && Number.isFinite(task.seed)) taskSeed = task.seed;
    const visualState = task ? task.state : (snap.state === "active" ? "active" : "idle");
    setState(visualState);

    // step count folded into the chip (replaces the old stats line)
    const steps = task && task.stats ? task.stats.steps : (snap.recent || []).length;
    countEl.textContent = steps ? "· " + steps : "";

    const cur = snap.current;
    if (cur) {
      nowGlyph.textContent = GLYPH[cur.state] || "⟳";
      nowText.textContent  = cur.label || cur.tool || "";
    } else {
      const recent = snap.recent || [];
      const last = recent[recent.length - 1];
      nowGlyph.textContent = glyphForIdleState(visualState, last);
      nowText.textContent  = textForIdleState(visualState, task, last);
    }

    // feed: short context (last 4), only redraw when the set changes
    const recentSteps = (snap.recent || []).slice(-4);
    const sig = recentSteps.map(s => s.id + ":" + s.state).join("|");
    if (sig !== lastRenderedIds) { lastRenderedIds = sig; drawFeed(recentSteps); }
  }

  function glyphForIdleState(s, last) {
    if (s === "error") return "✗";
    if (s === "timeout") return "·";
    if (s === "complete") return "✓";
    return last ? (GLYPH[last.state] || "✓") : "✓";
  }
  function textForIdleState(s, task, last) {
    if (s === "waiting") return task ? "waiting for next step" : "standing by";
    if (s === "dormant_waiting") return "still waiting";
    if (s === "complete") return "task complete";
    if (s === "error") return "task needs attention";
    if (s === "timeout") return "task timed out";
    if (s === "active" || s === "working") return last ? last.label : "working…";
    return "standing by";
  }

  // keyed rows: new ones slide in, existing ones just update (no flicker)
  const rowEls = new Map();
  function drawFeed(steps) {
    const ids = new Set(steps.map(s => String(s.id)));
    for (const [id, el] of rowEls) { if (!ids.has(id)) { el.remove(); rowEls.delete(id); } }
    let titled = feed.querySelector(".feed-title");
    if (steps.length && !titled) {
      titled = document.createElement("div");
      titled.className = "feed-title"; titled.textContent = "recent";
      feed.appendChild(titled);
    } else if (!steps.length && titled) { titled.remove(); }
    for (const s of steps) {
      const id = String(s.id);
      let el = rowEls.get(id);
      if (!el) {
        el = document.createElement("div");
        el.className = "row";
        el.innerHTML = '<span class="ico"></span><span class="lbl"></span><span class="kind"></span>';
        rowEls.set(id, el);
        feed.appendChild(el);
      }
      el.dataset.st = s.state;
      el.dataset.kind = s.kind || "act";
      el.querySelector(".ico").textContent = GLYPH[s.state] || "·";
      el.querySelector(".lbl").textContent = s.label || s.tool || "";
    }
    for (const s of steps) { const el = rowEls.get(String(s.id)); if (el) feed.appendChild(el); }
  }

  window.saarthiUpdate = function (snap) {
    try { render(typeof snap === "string" ? JSON.parse(snap) : snap); }
    catch (e) { /* ignore malformed pushes */ }
  };

  // ── standalone demo (open index.html?demo=1, or host.py --demo) ──
  if (location.search.includes("demo")) {
    const seq = [
      { tool: "app_launch", label: "Launching zen", kind: "act" },
      { tool: "window_focus", label: "Focusing window", kind: "act" },
      { tool: "find_text_on_screen", label: 'Looking for "Sign in"', kind: "read" },
      { tool: "click_text", label: 'Clicking "Sign in"', kind: "act" },
      { tool: "type_text", label: 'Typing "praxis@saarthi"', kind: "act" },
      { tool: "key_press", label: "Pressing enter", kind: "act" },
      { tool: "action_verify_window_state", label: "Verifying window state", kind: "read" },
    ];
    let id = 0; const recent = [];
    function step(i) {
      if (i >= seq.length) {
        window.saarthiUpdate({ state: "idle", current: null, recent: recent.slice(-4) });
        setTimeout(() => step(0), 2600); recent.length = 0; return;
      }
      const s = { id: id++, ...seq[i], state: "running", ts: new Date().toISOString() };
      recent.push(s);
      window.saarthiUpdate({ state: "active", current: s, recent: recent.slice(-4) });
      setTimeout(() => {
        s.state = id % 7 === 0 ? "error" : "done";
        window.saarthiUpdate({ state: "active", current: s, recent: recent.slice(-4) });
        setTimeout(() => step(i + 1), 320);
      }, 700 + (id % 5) * 180);
    }
    setTimeout(() => step(0), 600);
  }
})();
</script>
</body>
</html>
